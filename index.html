<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Gestión de Usuarios</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: 'Segoe UI', sans-serif; background: #f0f2f5; color: #333; }

    header {
      background: linear-gradient(135deg, #4f46e5, #7c3aed);
      color: white;
      padding: 24px 40px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    header h1 { font-size: 1.5rem; }
    .badge {
      background: rgba(255,255,255,0.2);
      padding: 6px 16px;
      border-radius: 20px;
      font-size: 0.9rem;
    }

    .container { max-width: 900px; margin: 30px auto; padding: 0 20px; }

    .card {
      background: white;
      border-radius: 16px;
      padding: 24px;
      margin-bottom: 24px;
      box-shadow: 0 4px 16px rgba(0,0,0,0.08);
      transition: transform 0.2s;
    }
    .card:hover { transform: translateY(-2px); }

    h2 { margin-bottom: 16px; font-size: 1.1rem; color: #4f46e5; }

    .form-group { display: flex; gap: 10px; flex-wrap: wrap; }
    input {
      flex: 1;
      padding: 10px 14px;
      border: 2px solid #eee;
      border-radius: 10px;
      font-size: 0.95rem;
      min-width: 150px;
      transition: border-color 0.2s;
    }
    input:focus { outline: none; border-color: #4f46e5; }

    button { padding: 10px 20px; border: none; border-radius: 10px; cursor: pointer; font-size: 0.95rem; transition: all 0.2s; }
    .btn-primary { background: linear-gradient(135deg, #4f46e5, #7c3aed); color: white; }
    .btn-primary:hover { transform: scale(1.05); box-shadow: 0 4px 12px rgba(79,70,229,0.4); }
    .btn-danger { background: #ef4444; color: white; font-size: 0.8rem; padding: 6px 12px; border-radius: 8px; }
    .btn-danger:hover { background: #dc2626; transform: scale(1.05); }

    table { width: 100%; border-collapse: collapse; }
    th { background: #f8f9fa; padding: 12px; text-align: left; font-size: 0.85rem; color: #666; border-bottom: 2px solid #eee; }
    td { padding: 12px; border-bottom: 1px solid #f0f0f0; font-size: 0.95rem; }

    tbody tr {
      animation: fadeIn 0.4s ease;
      transition: background 0.2s;
    }
    tbody tr:hover { background: #f5f3ff; }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(10px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .avatar {
      width: 34px; height: 34px;
      border-radius: 50%;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      color: white;
      font-weight: bold;
      font-size: 0.85rem;
      margin-right: 8px;
      vertical-align: middle;
    }

    .status { text-align: center; padding: 20px; color: #999; }
    .error { color: #ef4444; background: #fef2f2; padding: 12px; border-radius: 10px; margin-bottom: 16px; }
    .success { color: #16a34a; background: #f0fdf4; padding: 12px; border-radius: 10px; margin-bottom: 16px; animation: fadeIn 0.3s ease; }

    .removing { animation: fadeOut 0.3s ease forwards; }
    @keyframes fadeOut {
      to { opacity: 0; transform: translateX(20px); }
    }

    @media (max-width: 600px) {
      header { flex-direction: column; gap: 10px; text-align: center; }
      .form-group { flex-direction: column; }
    }
  </style>
</head>
<body>

<header>
  <h1>Gestión de Usuarios</h1>
  <div class="badge">Total: <span id="contador">0</span> usuarios</div>
</header>

<div class="container">

  <div class="card">
    <h2>Agregar Usuario</h2>
    <div id="mensaje"></div>
    <div class="form-group">
      <input type="text" id="nombre" placeholder="Nombre completo">
      <input type="email" id="email" placeholder="Correo electrónico">
      <button class="btn-primary" onclick="crearUsuario()">Agregar</button>
    </div>
  </div>

  <div class="card">
    <h2>Lista de Usuarios</h2>
    <div id="estado" class="status">Cargando...</div>
    <table id="tabla" style="display:none">
      <thead>
        <tr>
          <th>#</th>
          <th>Nombre</th>
          <th>Email</th>
          <th>Fecha</th>
          <th>Acción</th>
        </tr>
      </thead>
      <tbody id="cuerpo"></tbody>
    </table>
  </div>

</div>

<script>
  const API = 'http://127.0.0.1:5000/users';
  const colores = ['#4f46e5','#7c3aed','#db2777','#059669','#d97706','#dc2626'];

  function colorAvatar(nombre) {
    let hash = 0;
    for (let c of nombre) hash += c.charCodeAt(0);
    return colores[hash % colores.length];
  }

  async function cargarUsuarios() {
    try {
      const res = await fetch(API + '/');
      if (!res.ok) throw new Error('Error al cargar usuarios');
      const usuarios = await res.json();
      const cuerpo = document.getElementById('cuerpo');
      const estado = document.getElementById('estado');
      const tabla = document.getElementById('tabla');

      document.getElementById('contador').textContent = usuarios.length;

      if (usuarios.length === 0) {
        estado.textContent = 'No hay usuarios registrados.';
        estado.style.display = 'block';
        tabla.style.display = 'none';
        return;
      }

      cuerpo.innerHTML = '';
      usuarios.forEach(u => {
        const fecha = new Date(u.created_at).toLocaleDateString('es-ES');
        const inicial = u.name.charAt(0).toUpperCase();
        const color = colorAvatar(u.name);
        cuerpo.innerHTML += `
          <tr id="fila-${u.id}">
            <td>${u.id}</td>
            <td>
              <span class="avatar" style="background:${color}">${inicial}</span>
              ${u.name}
            </td>
            <td>${u.email}</td>
            <td>${fecha}</td>
            <td><button class="btn-danger" onclick="eliminarUsuario(${u.id})">Eliminar</button></td>
          </tr>`;
      });

      estado.style.display = 'none';
      tabla.style.display = 'table';
    } catch (e) {
      document.getElementById('estado').innerHTML = `<div class="error">${e.message}</div>`;
    }
  }

  async function crearUsuario() {
    const nombre = document.getElementById('nombre').value.trim();
    const email = document.getElementById('email').value.trim();
    const mensaje = document.getElementById('mensaje');

    if (!nombre || !email) {
      mensaje.innerHTML = '<div class="error">Completa todos los campos.</div>';
      return;
    }

    try {
      const res = await fetch(API + '/', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ name: nombre, email: email })
      });

      if (!res.ok) throw new Error('No se pudo crear el usuario');

      mensaje.innerHTML = '<div class="success">Usuario creado correctamente.</div>';
      document.getElementById('nombre').value = '';
      document.getElementById('email').value = '';
      setTimeout(() => mensaje.innerHTML = '', 3000);
      cargarUsuarios();
    } catch (e) {
      mensaje.innerHTML = `<div class="error">${e.message}</div>`;
    }
  }

  async function eliminarUsuario(id) {
    if (!confirm('¿Seguro que quieres eliminar este usuario?')) return;
    try {
      const fila = document.getElementById(`fila-${id}`);
      if (fila) fila.classList.add('removing');
      await new Promise(r => setTimeout(r, 300));
      const res = await fetch(`${API}/${id}`, { method: 'DELETE' });
      if (!res.ok) throw new Error('No se pudo eliminar');
      cargarUsuarios();
    } catch (e) {
      alert(e.message);
    }
  }

  cargarUsuarios();
</script>

</body>
</html>
